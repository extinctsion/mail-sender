<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcement</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;background-color:#ffffff;">
        <tr>
            <td style="background-color:#2C3E50;padding:30px 20px;text-align:center;">
                <h1 style="color:#ffffff;margin:0;font-size:26px;">{{ announcement_title | default("Important Announcement") }}</h1>
            </td>
        </tr>
        <tr>
            <td style="padding:30px 20px;">
                <p style="font-size:16px;color:#333333;margin:0 0 15px;">Dear {{ name }},</p>
                <div style="font-size:16px;color:#333333;line-height:1.6;margin:0 0 15px;">
                    {{ announcement_body | default("We have an important update to share with you. Please stay tuned for more details.") }}
                </div>
                <p style="font-size:14px;color:#666666;margin:20px 0 0;">
                    If you have any questions, please don't hesitate to reach out.
                </p>
            </td>
        </tr>
        <tr>
            <td style="background-color:#f4f4f4;padding:20px;text-align:center;font-size:12px;color:#999999;">
                <p style="margin:0;">Sent to {{ email }}</p>
            </td>
        </tr>
    </table>
</body>
</html>
